# Déploiement Static Site — https://render.com/docs/static-sites
# Sync ce fichier depuis le dashboard (Blueprints) ou recopie les champs manuellement.
services:
  - type: web
    name: campectus-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    # Relatif à rootDir (dossier frontend), pas à la racine du repo
    staticPublishPath: dist/frontend/browser
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
